<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Token Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { font-size: 1.1em; opacity: 0.9; }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .panel {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .panel h2 { color: #333; margin-bottom: 15px; font-size: 1.4em; }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .form-group label { font-weight: 600; color: #555; font-size: 0.95em; }
        .form-group select, .form-group textarea {
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
        }
        textarea {
            width: 100%;
            height: 300px;
            font-family: 'Monaco', monospace;
            resize: vertical;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 10px;
            margin-top: 10px;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3); }
        .btn-export { background: #27ae60; color: white; }
        .btn-export:hover { background: #229954; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .stat-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }
        .stat-label { color: #999; font-size: 0.85em; font-weight: 600; text-transform: uppercase; }
        .stat-value { color: #333; font-size: 1.8em; font-weight: 700; margin-top: 5px; }
        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        table th {
            background: #f8f9fa;
            border-bottom: 2px solid #ddd;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #555;
        }
        table td { padding: 12px; border-bottom: 1px solid #eee; }
        table tbody tr:hover { background: #f8f9fa; }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .badge-user { background: #e8f4f8; color: #0066cc; }
        .badge-assistant { background: #f0e8f8; color: #7722bb; }
        .message { color: #666; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .token { color: #667eea; font-weight: 600; }
        .error { background: #fee; color: #c33; padding: 12px; border-radius: 6px; margin-top: 10px; }
        .success { background: #efe; color: #3c3; padding: 12px; border-radius: 6px; margin-top: 10px; }
        .empty { text-align: center; color: #999; padding: 40px 20px; }
        .full-width { grid-column: 1 / -1; }
        @media (max-width: 1000px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💬 Chat Token Analyzer</h1>
            <p>Paste your chat and analyze token usage per message</p>
        </div>

        <div class="main-grid">
            <!-- Input -->
            <div class="panel">
                <h2>Input</h2>
                <div class="form-group">
                    <label>Chat Format</label>
                    <select id="format">
                        <option value="generic">Generic (User:/Assistant:)</option>
                        <option value="json">JSON array</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Paste Chat</label>
                    <textarea id="chatInput" placeholder="Paste your entire chat here..."></textarea>
                </div>
                <button class="btn-primary" onclick="analyzeChatLocal()">Analyze</button>
                <button class="btn-primary" onclick="loadSampleChat()">Load Sample</button>
                <div id="inputMessage"></div>
            </div>

            <!-- Stats -->
            <div class="panel">
                <h2>Summary</h2>
                <div id="statsContainer" class="empty">
                    <p>👆 Analyze a chat to see results</p>
                </div>
            </div>

            <!-- Table -->
            <div class="panel full-width">
                <h2>Message Breakdown</h2>
                <div id="tableContainer" class="empty">
                    <p>Results appear here</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function estimateTokens(text, method = 'char') {
            if (!text) return 0;
            return Math.ceil(text.length / 4); // ~1 token per 4 chars
        }

        function parseChat(text, format) {
            const messages = [];
            if (format === 'generic') {
                const regex = /^(User|Assistant):\s*([\s\S]*?)(?=^(?:User|Assistant):|$)/gm;
                let match;
                while ((match = regex.exec(text)) !== null) {
                    messages.push({
                        role: match[1].toLowerCase(),
                        content: match[2].trim()
                    });
                }
            } else if (format === 'json') {
                try {
                    return JSON.parse(text);
                } catch (e) {
                    throw new Error('Invalid JSON');
                }
            }
            return messages;
        }

        function analyzeChatLocal() {
            const format = document.getElementById('format').value;
            const chatText = document.getElementById('chatInput').value.trim();

            if (!chatText) {
                document.getElementById('inputMessage').innerHTML = '<div class="error">Paste a chat first</div>';
                return;
            }

            try {
                const messages = parseChat(chatText, format);
                if (messages.length === 0) {
                    throw new Error('No messages parsed');
                }

                const results = [];
                let totalInput = 0, totalOutput = 0;
                let userCount = 0, assistantCount = 0;

                for (const msg of messages) {
                    const tokens = estimateTokens(msg.content);
                    results.push({
                        ...msg,
                        tokens,
                        preview: msg.content.substring(0, 50)
                    });

                    if (msg.role === 'user') {
                        totalInput += tokens;
                        userCount++;
                    } else {
                        totalOutput += tokens;
                        assistantCount++;
                    }
                }

                displayStats(results, totalInput, totalOutput, userCount, assistantCount);
                displayTable(results);
                document.getElementById('inputMessage').innerHTML = '<div class="success">✓ Chat analyzed</div>';

            } catch (error) {
                document.getElementById('inputMessage').innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        function displayStats(results, inputTokens, outputTokens, userCount, assistantCount) {
            const total = inputTokens + outputTokens;
            const avgIn = userCount > 0 ? Math.round(inputTokens / userCount) : 0;
            const avgOut = assistantCount > 0 ? Math.round(outputTokens / assistantCount) : 0;

            const html = `
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-label">Total Tokens</div>
                        <div class="stat-value">${total.toLocaleString()}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Input (User)</div>
                        <div class="stat-value">${inputTokens.toLocaleString()}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Output (Assistant)</div>
                        <div class="stat-value">${outputTokens.toLocaleString()}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Avg Per User Msg</div>
                        <div class="stat-value">${avgIn.toLocaleString()}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">User Messages</div>
                        <div class="stat-value">${userCount}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Assistant Messages</div>
                        <div class="stat-value">${assistantCount}</div>
                    </div>
                </div>
                <button class="btn-export" onclick="exportJSON()" style="width: 100%; margin-top: 20px;">📥 Export JSON</button>
                <button class="btn-export" onclick="exportCSV()" style="width: 100%; margin-top: 10px; background: #3498db;">📊 Export CSV</button>
            `;
            document.getElementById('statsContainer').innerHTML = html;
            window.lastResults = results;
        }

        function displayTable(results) {
            const rows = results.map((m, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td><span class="badge ${m.role === 'user' ? 'badge-user' : 'badge-assistant'}">${m.role}</span></td>
                    <td><span class="message">${escapeHtml(m.preview)}${m.content.length > 50 ? '...' : ''}</span></td>
                    <td><span class="token">${m.tokens}</span></td>
                </tr>
            `).join('');

            document.getElementById('tableContainer').innerHTML = `
                <div class="table-container">
                    <table>
                        <thead><tr><th>#</th><th>Role</th><th>Preview</th><th style="text-align:right">Tokens</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            `;
        }

        function exportJSON() {
            const format = document.getElementById('format').value;
            const text = document.getElementById('chatInput').value;
            const messages = parseChat(text, format);
            const results = messages.map((m, i) => ({
                index: i + 1,
                role: m.role,
                tokens: estimateTokens(m.content),
                length: m.content.length
            }));
            const data = {
                timestamp: new Date().toISOString(),
                total_messages: results.length,
                total_tokens: results.reduce((s, r) => s + r.tokens, 0),
                input_tokens: results.filter(r => r.role === 'user').reduce((s, r) => s + r.tokens, 0),
                output_tokens: results.filter(r => r.role === 'assistant').reduce((s, r) => s + r.tokens, 0),
                messages: results
            };
            downloadFile(JSON.stringify(data, null, 2), 'chat-analysis.json', 'application/json');
        }

        function exportCSV() {
            const format = document.getElementById('format').value;
            const text = document.getElementById('chatInput').value;
            const messages = parseChat(text, format);
            let csv = 'Index,Role,Tokens,Length\n';
            csv += messages.map((m, i) =>
                `${i + 1},"${m.role}",${estimateTokens(m.content)},${m.content.length}`
            ).join('\n');
            downloadFile(csv, 'chat-analysis.csv', 'text/csv');
        }

        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function loadSampleChat() {
            const sample = `User: What is machine learning?
